name: EcoTrack AI CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        working-directory: eco-track-ai
        run: npm install

      - name: Run Tests
        working-directory: eco-track-ai
        run: npm run test

      - name: Build Project
        working-directory: eco-track-ai
        run: npm run build